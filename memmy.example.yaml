server:
  transports:
    # MCP streamable HTTP transport. Long-lived process, accepts many
    # concurrent client sessions. Use this for typical server deployments.
    mcp:
      enabled: true
      addr: "0.0.0.0:8765"

    # MCP stdio transport. The process is launched as a child by an
    # MCP-aware host (editor / agent runtime); JSON-RPC frames travel
    # over stdin/stdout. Logs go to stderr.
    #
    # MUTUALLY EXCLUSIVE with every other transport. Enable EITHER
    # mcp/grpc/http (one or more) OR stdio — not both.
    stdio:
      enabled: false

storage:
  backend: bbolt
  bbolt:
    path: "./data/memmy.db"

embedder:
  # Set backend to "gemini" for production.
  # The fake backend is intended for development and integration tests.
  backend: fake
  fake:
    dim: 64
  gemini:
    # gemini-embedding-2 is the default. memmy applies the
    # documented in-band task prefixes automatically:
    #   - chunks at write time get "title: none | text: ..."
    #   - queries at recall time get "task: search result | query: ..."
    # No knob — memmy hard-codes the right task per operation.
    model: "gemini-embedding-2"
    # Required when embedder.backend == "gemini". Paste your key here
    # OR generate this file from a template (envsubst, sops, etc.)
    # before passing it to memmy. memmy does not read environment
    # variables for secrets; it consumes the literal string.
    api_key: ""
    # 3072 is gemini-embedding-2's native max dimension (Matryoshka:
    # truncatable to 1536 or 768 for cheaper storage at minor cost).
    dim: 3072
    concurrency: 8

vector_index:
  flat_scan_threshold: 5000
  hnsw:
    m: 16
    m0: 32
    ef_construction: 200
    ef_search: 100
    ml: 0.36

memory:
  chunk_window_size: 3
  chunk_stride: 2
  retrieval_k: 8
  retrieval_hops: 2
  retrieval_oversample: 300
  structural_recent_n: 16
  structural_recent_delta: 5m

  # Per-node refractory period for explicit Reinforce/Demote/Mark calls.
  # If the same node is touched again within this window, the bump is
  # skipped (the call still records the access). Implicit Recall
  # co-retrieval bumps are NOT throttled. Set to 0 to disable.
  refractory_period: 60s

  # When true, positive Reinforce/Mark deltas scale by (1 - w/weight_cap)
  # so repeated reinforcement approaches weight_cap asymptotically
  # instead of slamming into it. Demote is unaffected.
  log_dampening: true

  # Maximum number of recent nodes a single memory.mark call will walk.
  mark_max_nodes: 256

  scoring:
    sim_alpha: 1.0
    weight_beta: 0.5

  decay:
    node_lambda: 8.0e-8
    edge_structural_lambda: 4.0e-8
    edge_coretrieval_lambda: 2.7e-7
    edge_cotraversal_lambda: 1.3e-7

  reinforce:
    node_delta: 1.0
    edge_coretrieval_base: 0.5
    edge_cotraversal_multiplier: 1.5
    edge_structural_weight: 1.0
    edge_structural_temporal_weight: 0.3

  prune:
    edge_floor: 0.05
    node_floor: 0.01

  weight_cap: 100.0

# Optional tenant-tuple schema. When set, every memory.* call's `tenant`
# field is validated against this shape: the schema is rendered into
# the MCP tool InputSchema (so the LLM sees the constraints when
# listing tools), and invalid calls return a structured corrective
# error so the LLM can self-correct on retry.
#
# When this section is absent or empty, memmy accepts any string-keyed
# tenant tuple — today's default behavior.
#
# IMPORTANT: changing the schema does NOT migrate stored memories.
# TenantID is derived from the (validated) tuple, so data written
# under one schema remains addressable as soon as the schema is
# changed back to one that accepts the original tuple shape. Memories
# don't get rewritten or lost when the schema rolls.
tenant:
  description: |
    Identity for this memory. Use `project` (absolute path of the
    working directory) for memories about a specific codebase.
    Use `scope: "global"` for cross-project knowledge — preferences,
    recurring patterns, things that survive any single repo.
  keys:
    project:
      description: "Absolute path of the working directory."
      pattern: "^/"
    scope:
      description: "Memory scope; 'global' for cross-project."
      enum: ["global"]
  # Exactly one of these key sets must be present in every tenant
  # tuple. Sending both project and scope, or neither, is rejected.
  one_of:
    - [project]
    - [scope]
